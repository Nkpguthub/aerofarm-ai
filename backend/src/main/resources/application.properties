spring.application.name=aerofarm-backend
server.port=${PORT:8080}

# ── MySQL (env vars set in Render dashboard) ──
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/aeroponic_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──
jwt.secret=${JWT_SECRET:aerofarm-ai-super-secret-key-2026-change-in-production}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ── MQTT ──
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=aerofarm-server
mqtt.topic.sensors=aeroponic/+/+/sensors

# ── CORS ──
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Logging ──
logging.level.com.aeroponic=INFO
logging.level.org.springframework.security=WARN
