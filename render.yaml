services:
  - type: web
    name: aerofarm-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/aerofarm-backend-1.0.0.jar
    healthCheckPath: /api/auth/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: MQTT_BROKER_URL
        value: tcp://localhost:1883
